<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 265">
  <title>Radioxide</title>

  <!-- Radio signal arcs, emanating upward from antenna tip at (100, 98) -->
  <g stroke="#F74C00" stroke-width="3.5" fill="none" stroke-linecap="round">
    <path d="M 82,98 A 18,18 0 0 0 118,98"/>
    <path d="M 68,98 A 32,32 0 0 0 132,98"/>
    <path d="M 54,98 A 46,46 0 0 0 146,98"/>
  </g>

  <!-- Antenna tip dot -->
  <circle cx="100" cy="98" r="4" fill="#F74C00"/>

  <!-- Antenna stem connecting tip to gear body -->
  <line x1="100" y1="102" x2="100" y2="137" stroke="#F74C00" stroke-width="3"/>

  <!--
    Gear centered at (100, 165).
    8 teeth: outer radius 40, inner radius 28.
    Each tooth spans 16° (±8° from centre), gaps 29°.
    Spoke holes at r=18, angles -90°/30°/150°; hub hole r=9.
    fill-rule="evenodd" makes the holes transparent.
  -->
  <path transform="translate(100,165)"
        fill="#F74C00"
        fill-rule="evenodd"
        d="M -3.90,-27.73 L -4.88,-39.70 A 40,40 0 0 1 4.88,-39.70 L 3.90,-27.73
           A 28,28 0 0 1 16.85,-22.36 L 24.63,-31.52 A 40,40 0 0 1 31.52,-24.63 L 22.36,-16.85
           A 28,28 0 0 1 27.73,-3.90 L 39.70,-4.88 A 40,40 0 0 1 39.70,4.88 L 27.73,3.90
           A 28,28 0 0 1 22.36,16.85 L 31.52,24.63 A 40,40 0 0 1 24.63,31.52 L 16.85,22.36
           A 28,28 0 0 1 3.90,27.73 L 4.88,39.70 A 40,40 0 0 1 -4.88,39.70 L -3.90,27.73
           A 28,28 0 0 1 -16.85,22.36 L -24.63,31.52 A 40,40 0 0 1 -31.52,24.63 L -22.36,16.85
           A 28,28 0 0 1 -27.73,3.90 L -39.70,4.88 A 40,40 0 0 1 -39.70,-4.88 L -27.73,-3.90
           A 28,28 0 0 1 -22.36,-16.85 L -31.52,-24.63 A 40,40 0 0 1 -24.63,-31.52 L -16.85,-22.36
           A 28,28 0 0 1 -3.90,-27.73 Z
           M 9,0 A 9,9 0 1 0 -9,0 A 9,9 0 1 0 9,0 Z
           M 4,-18 A 4,4 0 1 0 -4,-18 A 4,4 0 1 0 4,-18 Z
           M 19.59,9 A 4,4 0 1 0 11.59,9 A 4,4 0 1 0 19.59,9 Z
           M -11.59,9 A 4,4 0 1 0 -19.59,9 A 4,4 0 1 0 -11.59,9 Z"/>

  <!-- Wordmark -->
  <text x="100" y="238"
        font-family="'Courier New', Courier, monospace"
        font-size="18"
        fill="#F74C00"
        text-anchor="middle"
        font-weight="bold"
        letter-spacing="2">RADIOXIDE</text>
</svg>
