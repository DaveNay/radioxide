<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 165">
  <title>Radioxide</title>

  <!--
    Concept: RF sine wave (ham radio) running left-to-right, with a Rust gear
    centred on it. The gear sits on the signal like a component on a wire.
    Holes in the gear are transparent (evenodd), revealing the wave behind.

    Wave: 3 full periods, period=80px, amplitude=22px, centre y=70.
    Zero-crossings at x=0,40,80,120,160,200,240.
    Gear centred at the x=120 zero-crossing.

    Gear: 8 teeth, outer r=40, inner r=28, hub r=9.
    Spoke holes r=4 at angles -90°/30°/150° on r=18 circle.
  -->

  <!-- RF sine wave (drawn first, behind the gear) -->
  <path d="M 0,70
           C 14.6,48 25.4,48 40,70
           C 54.6,92 65.4,92 80,70
           C 94.6,48 105.4,48 120,70
           C 134.6,92 145.4,92 160,70
           C 174.6,48 185.4,48 200,70
           C 214.6,92 225.4,92 240,70"
        fill="none" stroke="#F74C00" stroke-width="3.5" stroke-linecap="round"/>

  <!--
    Gear centred at (120, 70), drawn on top of the wave.
    Transparent holes (fill-rule evenodd) let the wave show through.
  -->
  <path transform="translate(120,70)"
        fill="#F74C00"
        fill-rule="evenodd"
        d="M -3.90,-27.73 L -4.88,-39.70 A 40,40 0 0 1 4.88,-39.70 L 3.90,-27.73
           A 28,28 0 0 1 16.85,-22.36 L 24.63,-31.52 A 40,40 0 0 1 31.52,-24.63 L 22.36,-16.85
           A 28,28 0 0 1 27.73,-3.90 L 39.70,-4.88 A 40,40 0 0 1 39.70,4.88 L 27.73,3.90
           A 28,28 0 0 1 22.36,16.85 L 31.52,24.63 A 40,40 0 0 1 24.63,31.52 L 16.85,22.36
           A 28,28 0 0 1 3.90,27.73 L 4.88,39.70 A 40,40 0 0 1 -4.88,39.70 L -3.90,27.73
           A 28,28 0 0 1 -16.85,22.36 L -24.63,31.52 A 40,40 0 0 1 -31.52,24.63 L -22.36,16.85
           A 28,28 0 0 1 -27.73,3.90 L -39.70,4.88 A 40,40 0 0 1 -39.70,-4.88 L -27.73,-3.90
           A 28,28 0 0 1 -22.36,-16.85 L -31.52,-24.63 A 40,40 0 0 1 -24.63,-31.52 L -16.85,-22.36
           A 28,28 0 0 1 -3.90,-27.73 Z
           M 9,0 A 9,9 0 1 0 -9,0 A 9,9 0 1 0 9,0 Z
           M 4,-18 A 4,4 0 1 0 -4,-18 A 4,4 0 1 0 4,-18 Z
           M 19.59,9 A 4,4 0 1 0 11.59,9 A 4,4 0 1 0 19.59,9 Z
           M -11.59,9 A 4,4 0 1 0 -19.59,9 A 4,4 0 1 0 -11.59,9 Z"/>

  <!-- Wordmark -->
  <text x="120" y="152"
        font-family="'Courier New', Courier, monospace"
        font-size="18"
        fill="#F74C00"
        text-anchor="middle"
        font-weight="bold"
        letter-spacing="2">RADIOXIDE</text>
</svg>
